<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="/">Stock Logger</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav mr-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Главная</a>
                    </li>
                    <li class="nav-item active">
                        <a class="nav-link" href="/reports">Отчеты</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h1 class="my-4">{{.Title}}</h1>

        <div class="mb-4">
            <button id="generate-report-btn" class="btn btn-success" onclick="generateNewReport()">
                Создать новый отчет
            </button>
        </div>
        
        <div class="row">
            <div class="col-md-12">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Created At</th>
                            <th>File Path</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="files-list">
                        <!-- Files will be populated here by JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        function generateNewReport() {
            const button = document.getElementById('generate-report-btn');
            
            // Disable the button
            button.disabled = true;
            button.textContent = 'Генерация...';
            
            // Make POST request to generate new report
            fetch('/api/excel/generate', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.json();
            })
            .then(data => {
                // On success, reload the page to show the new report
                window.location.reload();
            })
            .catch(error => {
                console.error('Error generating report:', error);
                // Re-enable the button in case of error
                button.disabled = false;
                button.textContent = 'Создать новый отчет';
                alert('Ошибка при генерации отчета: ' + error.message);
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            // Fetch the list of Excel files using fetch API instead of jQuery
            fetch('/api/excel/list')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(files => {
                    const filesList = document.getElementById('files-list');
                    
                    if (files.length === 0) {
                        filesList.innerHTML = '<tr><td colspan="4">No files found</td></tr>';
                        return;
                    }
                    
                    files.forEach(function(file) {
                        const row = document.createElement('tr');
                        
                        // Construct the full file path using hardcoded directory
                        const fullPath = '/file-reports/' + file.FilePath;
                        
                        row.innerHTML = `
                            <td>${file.ID}</td>
                            <td>${new Date(file.CreatedAt).toLocaleString()}</td>
                            <td>${file.FilePath}</td>
                            <td><a href="${fullPath}" class="btn btn-primary btn-sm" download>Download</a></td>
                        `;
                        
                        filesList.appendChild(row);
                    });
                })
                .catch(error => {
                    console.error('Error fetching files:', error);
                    const filesList = document.getElementById('files-list');
                    filesList.innerHTML = '<tr><td colspan="4">Error loading files</td></tr>';
                });
        });
    </script>
</body>
</html>
