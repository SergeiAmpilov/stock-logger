<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <!-- Include Bootstrap 4.5.2 CSS - removed integrity attribute due to potential hash mismatch -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="my-4">{{.Title}}</h1>
        
        <div class="row">
            <div class="col-md-12">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Created At</th>
                            <th>File Path</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="files-list">
                        <!-- Files will be populated here by JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Fetch the list of Excel files using fetch API instead of jQuery
            fetch('/api/excel/list')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(files => {
                    const filesList = document.getElementById('files-list');
                    
                    if (files.length === 0) {
                        filesList.innerHTML = '<tr><td colspan="4">No files found</td></tr>';
                        return;
                    }
                    
                    files.forEach(function(file) {
                        console.log(file);
                        const row = document.createElement('tr');
                        
                        // Construct the full file path using hardcoded directory
                        const fullPath = '/file-reports/' + file.FilePath;
                        
                        row.innerHTML = `
                            <td>${file.ID}</td>
                            <td>${new Date(file.CreatedAt).toLocaleString()}</td>
                            <td>${file.FilePath}</td>
                            <td><a href="${fullPath}" class="btn btn-primary btn-sm" download>Download</a></td>
                        `;
                        
                        filesList.appendChild(row);
                    });
                })
                .catch(error => {
                    console.error('Error fetching files:', error);
                    const filesList = document.getElementById('files-list');
                    filesList.innerHTML = '<tr><td colspan="4">Error loading files</td></tr>';
                });
        });
    </script>
</body>
</html>
