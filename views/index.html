<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="/">Stock Logger</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav mr-auto">
                    <li class="nav-item active">
                        <a class="nav-link" href="/">Главная</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/reports">Отчеты</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="#" id="auth-button">Авторизоваться</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Authorization Popup -->
    <div id="auth-popup" class="popup-overlay" style="display:none;">
        <div class="popup-content">
            <div class="popup-header">
                <h5>Авторизация</h5>
                <button type="button" class="close-btn" id="close-auth">&times;</button>
            </div>
            <div class="popup-body">
                <input type="password" id="password-input" placeholder="Введите пароль" class="form-control">
                <br>
                <button type="button" class="btn btn-primary" id="login-btn">Авторизоваться</button>
            </div>
        </div>
    </div>

    <style>
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 9999;
        }

        .popup-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            width: 400px;
            max-width: 90%;
        }

        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .close-btn {
            font-size: 24px;
            border: none;
            background: none;
            cursor: pointer;
        }

        /* Стили для красной кнопки выхода */
        #auth-button.logout {
            color: #dc3545 !important;
            font-weight: 500;
        }
        #auth-button.logout:hover {
            color: #a71d2a !important;
        }
    </style>

    <div class="container mt-5">
        <h1>{{.Title}}</h1>
        <p class="lead">Добро пожаловать в приложение парсинга цен и остатков OZON</p>
        
        <div class="row mb-3">
            <div class="col-md-3">
                <label for="limit-input">Лимит:</label>
                <input type="number" id="limit-input" class="form-control" value="100" min="1">
            </div>
            <div class="col-md-3">
                <label for="offset-input">Отступ:</label>
                <input type="number" id="offset-input" class="form-control" value="0" min="0">
            </div>
            <div class="col-md-6 d-flex align-items-end">
                <button id="show-stocks-btn" class="btn btn-primary">Показать остатки</button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-striped">
                <thead id="stocks-table-head">
                    <tr>
                        <th>Артикул</th>
                        <!-- Dates will be added dynamically -->
                    </tr>
                </thead>
                <tbody id="stocks-table-body">
                    <!-- Data will be loaded here -->
                </tbody>
            </table>
        </div>

        <nav aria-label="Page navigation">
            <ul class="pagination" id="pagination-container">
                <!-- Pagination links will be generated here -->
            </ul>
        </nav>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Get elements
            const authButton = document.getElementById('auth-button');
            const authPopup = document.getElementById('auth-popup');
            const closeAuth = document.getElementById('close-auth');
            const loginBtn = document.getElementById('login-btn');
            const passwordInput = document.getElementById('password-input');

            // Функция обновления кнопки авторизации в зависимости от наличия токена
            function updateAuthButton() {
                const token = localStorage.getItem('token');
                if (token) {
                    authButton.textContent = 'Выйти';
                    authButton.classList.add('logout');
                } else {
                    authButton.textContent = 'Авторизоваться';
                    authButton.classList.remove('logout');
                }
            }

            // Функция выхода из системы
            function logout() {
                localStorage.removeItem('token');
                updateAuthButton();
                window.location.reload();
            }

            // Обработчик клика по кнопке авторизации/выхода
            authButton.addEventListener('click', function(e) {
                e.preventDefault();
                const token = localStorage.getItem('token');
                
                if (token) {
                    // Если есть токен — выполняем выход
                    logout();
                } else {
                    // Если нет токена — показываем попап авторизации
                    authPopup.style.display = 'block';
                    passwordInput.value = '';
                }
            });

            // Проверка токена и обновление UI при загрузке страницы
            updateAuthButton();
            
            // Если токен есть — загружаем данные
            if (localStorage.getItem('token')) {
                loadStocks();
            }

            // Close popup when close button is clicked
            closeAuth.addEventListener('click', function() {
                authPopup.style.display = 'none';
            });

            // Close popup when clicking outside of the popup content
            authPopup.addEventListener('click', function(e) {
                if (e.target === authPopup) {
                    authPopup.style.display = 'none';
                }
            });

            // Handle login request
            loginBtn.addEventListener('click', function() {
                const password = passwordInput.value.trim();

                if (!password) {
                    alert('Пожалуйста, введите пароль');
                    return;
                }

                // Make POST request to /login
                fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        password: password
                    })
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    // Store token in localStorage
                    if (data.token) {
                        localStorage.setItem('token', data.token);
                        console.log('Token stored successfully');
                        // Close popup after successful login
                        authPopup.style.display = 'none';
                        // Update button and reload
                        updateAuthButton();
                        window.location.reload();
                    } else {
                        alert('Неверный формат ответа от сервера');
                    }
                })
                .catch(error => {
                    console.error('Login error:', error);
                    alert('Ошибка при авторизации: ' + error.message);
                });
            });

            document.getElementById('show-stocks-btn').addEventListener('click', function() {
                loadStocks();
            });
        });

        function loadStocks() {
            // Add token to headers if it exists
            const token = localStorage.getItem('token');
            const headers = {
                'Content-Type': 'application/json'
            };
            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            }
            
            const limit = document.getElementById('limit-input').value;
            const offset = document.getElementById('offset-input').value;

            // Build URL with query parameters
            const url = `/api/stocks?limit=${limit}&offset=${offset}`;
            
            fetch(url, { headers })
                .then(response => {
                    if (!response.ok) {
                        if (response.status === 401) {
                            // Redirect to auth popup if unauthorized
                            document.getElementById('auth-popup').style.display = 'block';
                            document.getElementById('password-input').value = '';
                        }
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(data => {
                    updateTable(data.articles);
                    updatePagination(data.page_info);
                })
                .catch(error => {
                    console.error('Error fetching stocks:', error);
                    document.getElementById('stocks-table-body').innerHTML = 
                        `<tr><td colspan="4">Error loading data: ${error.message}</td></tr>`;
                });
        }

        function updateTable(articles) {
            const tableHead = document.getElementById('stocks-table-head');
            const tableBody = document.getElementById('stocks-table-body');
            
            // Clear previous content
            tableHead.innerHTML = '<tr><th>Артикул</th></tr>';
            tableBody.innerHTML = '';
            
            if (!articles || articles.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="4">No data available</td></tr>';
                return;
            }
            
            // Collect all unique dates across all articles
            const allDates = new Set();
            articles.forEach(articleData => {
                articleData.data.forEach(report => {
                    const dateKey = formatDateKey(new Date(report.RetrievedDate));
                    allDates.add(dateKey);
                });
            });
            
            // Sort dates in descending order (most recent first)
            const sortedDates = Array.from(allDates).sort((a, b) => new Date(b) - new Date(a));
            
            // Create header row with date columns
            const headerRow = tableHead.querySelector('tr');
            sortedDates.forEach(date => {
                const th = document.createElement('th');
                th.colSpan = 2;
                th.textContent = new Date(date).toLocaleString();
                th.style.textAlign = 'center';
                headerRow.appendChild(th);
            });
            
            // Create data rows
            articles.forEach(articleData => {
                const row = document.createElement('tr');
                
                // Add article cell
                const articleCell = document.createElement('td');
                articleCell.textContent = articleData.article;
                row.appendChild(articleCell);
                
                // Create cells for each date
                sortedDates.forEach(date => {
                    const dateReports = articleData.data.filter(report => 
                        formatDateKey(new Date(report.RetrievedDate)) === date
                    );
                    
                    let stockCell = document.createElement('td');
                    let priceCell = document.createElement('td');
                    
                    if (dateReports.length > 0) {
                        const latestReport = dateReports.reduce((latest, current) => 
                            new Date(current.RetrievedDate) > new Date(latest.RetrievedDate) ? current : latest
                        );
                        
                        stockCell.textContent = latestReport.Stock;
                        priceCell.textContent = latestReport.OurPrice !== null && latestReport.OurPrice !== undefined 
                            ? latestReport.OurPrice.toFixed(2) 
                            : 'N/A';
                    } else {
                        stockCell.textContent = '-';
                        priceCell.textContent = '-';
                    }
                    
                    row.appendChild(stockCell);
                    row.appendChild(priceCell);
                });
                
                tableBody.appendChild(row);
            });
        }

        // Helper function to format date as YYYY-MM-DD for grouping
        function formatDateKey(date) {
            return date.getFullYear() + '-' + 
                   String(date.getMonth() + 1).padStart(2, '0') + '-' + 
                   String(date.getDate()).padStart(2, '0');
        }

        function updatePagination(pageInfo) {
            const paginationContainer = document.getElementById('pagination-container');
            paginationContainer.innerHTML = '';
            
            if (!pageInfo || pageInfo.total_pages <= 1) {
                return;
            }
            
            const currentPage = Math.floor(pageInfo.offset / pageInfo.limit) + 1;
            const totalPages = pageInfo.total_pages;
            
            // Previous button
            if (currentPage > 1) {
                const prevLi = document.createElement('li');
                prevLi.className = 'page-item';
                prevLi.innerHTML = `<a class="page-link" href="#" onclick="changePage(${currentPage - 1})">Предыдущая</a>`;
                paginationContainer.appendChild(prevLi);
            }
            
            // Current page indicator with total pages
            const currentLi = document.createElement('li');
            currentLi.className = 'page-item active';
            currentLi.innerHTML = `<span class="page-link">Страница ${currentPage} (${totalPages})</span>`;
            paginationContainer.appendChild(currentLi);
            
            // Next button
            if (currentPage < totalPages) {
                const nextLi = document.createElement('li');
                nextLi.className = 'page-item';
                nextLi.innerHTML = `<a class="page-link" href="#" onclick="changePage(${currentPage + 1})">Следующая</a>`;
                paginationContainer.appendChild(nextLi);
            }
        }

        function changePage(pageNumber) {
            const limit = parseInt(document.getElementById('limit-input').value);
            const offset = (pageNumber - 1) * limit;
            
            document.getElementById('offset-input').value = offset;
            
            loadStocks();
        }
    </script>
</body>
</html>
