<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="/">Stock Logger</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav mr-auto">
                    <li class="nav-item active">
                        <a class="nav-link" href="/">Главная</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/reports">Отчеты</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h1>{{.Title}}</h1>
        <p class="lead">Добро пожаловать в приложение парсинга цен и остатков OZON</p>
        
        <div class="row mb-3">
            <div class="col-md-3">
                <label for="limit-input">Лимит:</label>
                <input type="number" id="limit-input" class="form-control" value="100" min="1">
            </div>
            <div class="col-md-3">
                <label for="offset-input">Отступ:</label>
                <input type="number" id="offset-input" class="form-control" value="0" min="0">
            </div>
            <div class="col-md-6 d-flex align-items-end">
                <button id="show-stocks-btn" class="btn btn-primary">Показать остатки</button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-striped">
                <thead id="stocks-table-head">
                    <tr>
                        <th>Артикул</th>
                        <!-- Dates will be added dynamically -->
                    </tr>
                </thead>
                <tbody id="stocks-table-body">
                    <!-- Data will be loaded here -->
                </tbody>
            </table>
        </div>

        <nav aria-label="Page navigation">
            <ul class="pagination" id="pagination-container">
                <!-- Pagination links will be generated here -->
            </ul>
        </nav>


    </div>

    
<script>
        document.addEventListener('DOMContentLoaded', function() {
            // Initial load
            loadStocks();
            
            document.getElementById('show-stocks-btn').addEventListener('click', function() {
                loadStocks();
            });
        });

        function loadStocks() {
            const limit = document.getElementById('limit-input').value;
            const offset = document.getElementById('offset-input').value;
            
            // Build URL with query parameters
            const url = `/api/stocks?limit=${limit}&offset=${offset}`;
            
            fetch(url)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(data => {
                    updateTable(data.articles);
                    updatePagination(data.page_info);
                })
                .catch(error => {
                    console.error('Error fetching stocks:', error);
                    document.getElementById('stocks-table-body').innerHTML = 
                        `<tr><td colspan="4">Error loading data: ${error.message}</td></tr>`;
                });
        }

        function updateTable(articles) {
            const tableHead = document.getElementById('stocks-table-head');
            const tableBody = document.getElementById('stocks-table-body');
            
            // Clear previous content
            tableHead.innerHTML = '<tr><th>Артикул</th></tr>';
            tableBody.innerHTML = '';
            
            if (!articles || articles.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="4">No data available</td></tr>';
                return;
            }
            
            // Collect all unique dates across all articles
            const allDates = new Set();
            articles.forEach(articleData => {
                articleData.data.forEach(report => {
                    const dateKey = formatDateKey(new Date(report.RetrievedDate));
                    allDates.add(dateKey);
                });
            });
            
            // Sort dates in descending order (most recent first)
            const sortedDates = Array.from(allDates).sort((a, b) => new Date(b) - new Date(a));
            
            // Create header row with date columns
            const headerRow = tableHead.querySelector('tr');
            sortedDates.forEach(date => {
                const th = document.createElement('th');
                th.colSpan = 2; // Each date gets 2 columns: stock and price
                th.textContent = new Date(date).toLocaleString();
                th.style.textAlign = 'center';
                headerRow.appendChild(th);
            });
            
            // Create data rows
            articles.forEach(articleData => {
                const row = document.createElement('tr');
                
                // Add article cell
                const articleCell = document.createElement('td');
                articleCell.textContent = articleData.article;
                row.appendChild(articleCell);
                
                // Create cells for each date
                sortedDates.forEach(date => {
                    const dateReports = articleData.data.filter(report => 
                        formatDateKey(new Date(report.RetrievedDate)) === date
                    );
                    
                    // Find the most recent report for this date
                    let stockCell = document.createElement('td');
                    let priceCell = document.createElement('td');
                    
                    if (dateReports.length > 0) {
                        // Use the most recent report for the date
                        const latestReport = dateReports.reduce((latest, current) => 
                            new Date(current.RetrievedDate) > new Date(latest.RetrievedDate) ? current : latest
                        );
                        
                        stockCell.textContent = latestReport.Stock;
                        priceCell.textContent = latestReport.OurPrice !== null && latestReport.OurPrice !== undefined 
                            ? latestReport.OurPrice.toFixed(2) 
                            : 'N/A';
                    } else {
                        stockCell.textContent = '-';
                        priceCell.textContent = '-';
                    }
                    
                    row.appendChild(stockCell);
                    row.appendChild(priceCell);
                });
                
                tableBody.appendChild(row);
            });
        }

        // Helper function to format date as YYYY-MM-DD for grouping
        function formatDateKey(date) {
            return date.getFullYear() + '-' + 
                   String(date.getMonth() + 1).padStart(2, '0') + '-' + 
                   String(date.getDate()).padStart(2, '0');
        }

        function updatePagination(pageInfo) {
            const paginationContainer = document.getElementById('pagination-container');
            paginationContainer.innerHTML = '';
            
            if (!pageInfo || pageInfo.total_pages <= 1) {
                return; // No pagination needed
            }
            
            const currentPage = Math.floor(pageInfo.offset / pageInfo.limit) + 1;
            const totalPages = pageInfo.total_pages;
            
            // Previous button
            if (currentPage > 1) {
                const prevLi = document.createElement('li');
                prevLi.className = 'page-item';
                prevLi.innerHTML = `<a class="page-link" href="#" onclick="changePage(${currentPage - 1})">Предыдущая</a>`;
                paginationContainer.appendChild(prevLi);
            }
            
            // Current page indicator with total pages
            const currentLi = document.createElement('li');
            currentLi.className = 'page-item active';
            currentLi.innerHTML = `<span class="page-link">Страница ${currentPage} (${totalPages})</span>`;
            paginationContainer.appendChild(currentLi);
            
            // Next button
            if (currentPage < totalPages) {
                const nextLi = document.createElement('li');
                nextLi.className = 'page-item';
                nextLi.innerHTML = `<a class="page-link" href="#" onclick="changePage(${currentPage + 1})">Следующая</a>`;
                paginationContainer.appendChild(nextLi);
            }
        }

        function changePage(pageNumber) {
            const limit = parseInt(document.getElementById('limit-input').value);
            const offset = (pageNumber - 1) * limit;
            
            document.getElementById('offset-input').value = offset;
            
            loadStocks();
        }
    </script>

    
</body>
</html>
